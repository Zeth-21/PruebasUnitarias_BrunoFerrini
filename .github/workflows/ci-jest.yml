name: CI-Tests + Quality Gate
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-y-calidad:
    name: Tests + Cobertura + Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      # Ejecutar tests Y verificar umbrales de cobertura
      # Si la cobertura baja del 70%, este paso falla
      - name: Tests + Quality Gate de cobertura
        run: npm run test:coverage

      # Subir el reporte HTML como artefacto descargable
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov-report/
          retention-days: 7